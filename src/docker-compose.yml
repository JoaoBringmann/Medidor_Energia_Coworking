services:
  # 1. Broker MQTT (Comunicação de Baixa Latência com o ESP32)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    restart: always
    ports:
      - "1883:1883" # Porta padrão MQTT
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # 2. Banco de Dados de Séries Temporais (Armazena os Watts/segundo)
  influxdb:
    image: influxdb:1.8
    container_name: influxdb_energia
    restart: always
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=consumo_watts
    volumes:
      - influxdb_data:/var/lib/influxdb

  # 3. Dashboard do Gerente (Conectado ao InfluxDB)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    restart: always
    ports:
      - "3000:3000" # Acesse localhost:3000 para ver os gráficos
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana

  # Redis para cache
  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"

  # 4. Banco de Dados Relacional (Cadastros, Sessões e Créditos)
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-smart_lan}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Servidor Web Apache
  apache:
    image: httpd:2.4
    container_name: apache_web
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
    depends_on:
      - api

  # 5. API Backend (Python FastAPI)
  api:
    build: .
    container_name: backend_api
    restart: always
    ports:
      - "8000:8000" # Porta para os PCs e Celulares consumirem os dados
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-password123}
      - DB_NAME=${DB_NAME:-smart_lan}
      - MQTT_BROKER=mosquitto
      - INFLUX_URL=http://influxdb:8086
    depends_on:
      - db
      - mosquitto
      - influxdb

  # NAS com Samba (simulando OpenMediaVault)
  nas:
    image: dperson/samba
    container_name: samba_nas
    restart: always
    ports:
      - "1445:445"
      - "1139:139"
    volumes:
      - samba_data:/mnt
    command: '-s "shared;/mnt;yes;no;yes;;admin" -u "admin;admin123" -p'

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:
  samba_data: